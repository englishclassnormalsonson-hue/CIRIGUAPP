<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes Mesa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="CIRIGUAPP">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" href="icons/icon-192.png" type="image/png">
</head>

<body>

    <div class="encabezado">

        <h1 id="tituloMesa">MESA</h1>

        <p>Clientes Activos</p>

        <button class="volver boton-principal"
        onclick="window.location.href='index.html'">

            🏠 Inicio

        </button>

    </div>

    <div class="clientes-container" id="listaClientes">

    </div>

    <div class="clientes-container observacion-punto">

        <label for="observacionPunto">Observación o referencia del cliente (opcional)</label>

        <div class="observacion-fila">
            <input
                id="observacionPunto"
                type="text"
                maxlength="120"
                placeholder="Ej: Don Carlos, camisa roja, pagan separados"
            >

            <button class="boton-principal guardar-observacion" onclick="guardarObservacionPuntoActual(this)">
                Guardar
            </button>
        </div>

        <p id="estadoObservacion" class="estado-observacion"></p>

    </div>

    <div class="clientes-container acciones-mesa">

        <button class="nuevo-cliente" onclick="crearCliente()">
            ➕ Nuevo Cliente
        </button>

        <button class="marcar-cobro" onclick="marcarMesaParaCobro()">
            🔴 Marcar Mesa para Cobro
        </button>

        <button class="cobrar-mesa" onclick="cobrarMesaCompleta(this)">
            💰 Cobrar Mesa Completa
        </button>

        <button class="mantener-ocupada" onclick="mantenerMesaOcupada()">
            🔵 Mantener Ocupada
        </button>

<button class="liberar-mesa" onclick="liberarMesa()">
         🟢 Liberar Mesa
</button>

    </div>

    <div class="total-mesa">

    TOTAL MESA

    <h2 id="totalMesa">$0</h2>

</div>

    <div class="acciones-inferiores">

    <button class="recibo-mesa"
    onclick="verReciboMesa()">

        🧾 Recibo Mesa

    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="utils.js"></script>
<script src="ventas.js"></script>

<script>

const parametros =
    new URLSearchParams(window.location.search);

const tipoPuntoActual =
    normalizarTipoPuntoCirigua(
        parametros.get("tipo") || (parametros.has("barra") ? "barra" : "mesa")
    );

const mesaActual =
    Number(parametros.get(tipoPuntoActual === "barra" ? "barra" : "mesa") || parametros.get("mesa") || 1);

const etiquetaPuntoActual =
    etiquetaPuntoCirigua(tipoPuntoActual, mesaActual);

const clientesFijos = [1, 2, 3];

document.getElementById("tituloMesa").innerHTML =
    etiquetaPuntoActual.toUpperCase();

document.querySelector(".marcar-cobro").innerHTML =
    "🔴 Marcar " + etiquetaPuntoActual + " para Cobro";

document.querySelector(".cobrar-mesa").innerHTML =
    "💰 Cobrar " + etiquetaPuntoActual + " Completa";

document.querySelector(".mantener-ocupada").innerHTML =
    "🔵 Mantener Ocupada";

document.querySelector(".liberar-mesa").innerHTML =
    "🟢 Liberar " + etiquetaPuntoActual;

// Mesas utilities (claveCliente, leerProductosCliente, obtenerClientesDinamicos, etc.)
// fueron centralizadas en `utils.js` to avoid duplication.

function mostrarClientes(){

    const contenedor =
        document.getElementById("listaClientes");

    contenedor.innerHTML = "";

    let totalMesa = 0;

    obtenerTodosLosClientes().forEach(function(numero){

        let totalCliente =
            calcularTotalCliente(numero);

        totalMesa += totalCliente;

        let fila =
            document.createElement("div");

        fila.classList.add("cliente-fila");

        fila.innerHTML = `
            <button class="cliente-card"
            onclick="window.location.href='${urlPuntoCirigua("pedido.html", tipoPuntoActual, mesaActual, "cliente=" + numero)}'">

                Cliente ${numero}

                <span>$${totalCliente.toLocaleString()}</span>

            </button>
        `;

        if(numero > 3){

            let botonEliminar =
                document.createElement("button");

            botonEliminar.classList.add("eliminar-cliente");

            botonEliminar.innerHTML = "❌";

            botonEliminar.onclick = function(){
                eliminarCliente(numero);
            };

            fila.appendChild(botonEliminar);
        }

        contenedor.appendChild(fila);
    });

    document.getElementById("totalMesa").innerHTML =
        "$" + totalMesa.toLocaleString();

    actualizarEstadoMesa(mesaActual, totalMesa);
}

async function crearCliente(){

    let clientesDinamicos =
        obtenerClientesDinamicos();

    let todosLosClientes =
        clientesFijos.concat(clientesDinamicos);

    if(todosLosClientes.length >= maxClientesPorMesa()){
        alert("La mesa alcanzó el límite de " + maxClientesPorMesa() + " clientes.");
        return;
    }

    let nuevoNumero =
        Math.max(...todosLosClientes) + 1;

    try{

        await crearClienteMesaSupabase(
            mesaActual,
            nuevoNumero,
            tipoPuntoActual
        );

        clientesDinamicos.push(nuevoNumero);

        guardarClientesDinamicos(clientesDinamicos);

        mostrarClientes();

    }catch(error){

        console.error(
            "Error creando cliente en Supabase:",
            error
        );

        alert("No se pudo crear el cliente.");
    }
}

async function eliminarCliente(numero){

    if(numero <= 3){
        return;
    }

    let total =
        calcularTotalCliente(numero);

    if(total > 0){

        alert(
            "No puede eliminar un cliente con consumo pendiente."
        );

        return;
    }

    let confirmar =
        confirm(
            "¿Eliminar Cliente " +
            numero +
            "?"
        );

    if(!confirmar){
        return;
    }

    try{

        await borrarPedidoClienteSupabase(
            mesaActual,
            numero,
            tipoPuntoActual
        );

        let clientesDinamicos =
            obtenerClientesDinamicos();

        clientesDinamicos =
            clientesDinamicos.filter(function(cliente){
                return cliente !== numero;
            });

        guardarClientesDinamicos(clientesDinamicos);

        removeStorageItem(
            claveCliente(numero)
        );

        mostrarClientes();

    }catch(error){

        console.error(
            "Error eliminando cliente de Supabase:",
            error
        );

        alert("No se pudo eliminar el cliente.");
    }
}

async function marcarMesaParaCobro(){

    let totalMesa =
        calcularTotalMesa();

    if(totalMesa <= 0){

        alert("La mesa no tiene consumo pendiente.");

        return;
    }

    try{

        await cambiarEstadoMesaSupabase(
            mesaActual,
            "cobro",
            tipoPuntoActual
        );

        setStorageItem(
            claveEstadoMesa(),
            "cobro"
        );

        alert(etiquetaPuntoActual + " marcada para cobro.");

    }catch(error){

        console.error(
            "Error marcando mesa para cobro en Supabase:",
            error
        );

        alert("No se pudo marcar la mesa para cobro.");
    }
}

function cobrarMesaCompleta(boton){
    return ejecutarAccionCritica(boton, async function(){

    const totalMesa = calcularTotalMesa();

    if(totalMesa <= 0){
        alert("No hay nada para cobrar en esta mesa.");
        return false;
    }

    if(!confirm(
        "¿Confirma el cobro de " + etiquetaPuntoActual +
        " por $" + totalMesa.toLocaleString() + "?"
    )){
        return false;
    }

    let productosPorCliente = {};
    obtenerTodosLosClientes().forEach(function(numero){
        let productosCliente = leerProductosCliente(numero);
        if(productosCliente && Object.keys(productosCliente).length > 0){
            productosPorCliente["cliente_" + numero] = productosCliente;
        }
    });

    let datosFactura = crearDatosFacturaVenta({
        mesa: mesaActual,
        tipoPunto: tipoPuntoActual,
        puntoNumero: mesaActual,
        cliente: 0,
        tipo: tipoPuntoActual === "barra" ? "Cobro Barra" : "Cobro Mesa",
        total: totalMesa,
        productosPorCliente: productosPorCliente
    });

    let ventaRegistrada = null;
    if(typeof registrarVentaConfirmada === 'function'){
        try{
            ventaRegistrada = await registrarVentaConfirmada(datosFactura);
        }catch(error){
            console.error("No se pudo registrar la venta de mesa en Supabase:", error);
        }
    }

    if(!ventaRegistrada){
        alert("No se pudo registrar la venta. El consumo de la mesa NO fue borrado. Intente de nuevo.");
        return false;
    }

    try{

        await borrarTodosClientesMesaSupabase(mesaActual, tipoPuntoActual);

        await cambiarEstadoMesaSupabase(
            mesaActual,
            "libre",
            tipoPuntoActual
        );

    }catch(error){

        console.error(
            "Error limpiando la mesa en Supabase:",
            error
        );

        alert("La venta fue registrada, pero no se pudo limpiar la mesa en Supabase.");
        return false;
    }

    // Borrar completamente todos los clientes de la mesa
    obtenerTodosLosClientes().forEach(function(numero){
        removeStorageItem(claveCliente(numero));
        removeStorageItem("cliente_" + numero);
    });

    // Reiniciar estructura de clientes
    removeStorageItem(claveClientesDinamicos());
    removeStorageItem(claveClientesInicializados());

    // Limpiar estado de la mesa
    setStorageItem(claveTotalMesa(), 0);
    setStorageItem(claveEstadoMesa(), "libre");

    mostrarClientes();

    alert(etiquetaPuntoActual + " cobrada correctamente.");

    window.location.replace("index.html");
    });
}

async function mantenerMesaOcupada(){

    try{

        await cambiarEstadoMesaSupabase(
            mesaActual,
            "pagada",
            tipoPuntoActual
        );

        setStorageItem(
            claveEstadoMesa(),
            "pagada"
        );

        alert(
            etiquetaPuntoActual + " marcada como ocupada."
        );

        window.location.href =
            "index.html";

    }catch(error){

        console.error(
            "Error manteniendo la mesa ocupada en Supabase:",
            error
        );

        alert("No se pudo mantener la mesa ocupada.");
    }
}

async function liberarMesa(){

    try{

        await borrarTodosClientesMesaSupabase(mesaActual, tipoPuntoActual);

        await cambiarEstadoMesaSupabase(
            mesaActual,
            "libre",
            tipoPuntoActual
        );

    }catch(error){

        console.error(
            "Error liberando la mesa en Supabase:",
            error
        );

        alert("No se pudo liberar la mesa.");

        return;
    }

    // Eliminar pedidos de todos los clientes y marcar mesa libre
    obtenerTodosLosClientes().forEach(function(numero){
        removeStorageItem(claveCliente(numero));
        removeStorageItem("cliente_" + numero);
    });

    // Reiniciar estructura de clientes dinámicos para evitar conservar estados
    removeStorageItem(claveClientesDinamicos());
    removeStorageItem(claveClientesInicializados());

    setStorageItem(claveEstadoMesa(), "libre");
    setStorageItem(claveTotalMesa(), 0);

    alert(
        etiquetaPuntoActual + " liberada correctamente."
    );

    window.location.href =
        "index.html";
}

function verReciboMesa(){

    window.open(

        urlPuntoCirigua("reciboMesa.html", tipoPuntoActual, mesaActual),

        "_blank"

    );

}
async function iniciarClientes(){

    try{

        let clientesSupabase =
            await obtenerClientesMesaSupabase(mesaActual, tipoPuntoActual);

        let clientesDinamicos = [];

        clientesSupabase.forEach(function(cliente){

            if(Number(cliente.numero_cliente) > 3){
                clientesDinamicos.push(
                    Number(cliente.numero_cliente)
                );
            }

            if(
                cliente.productos &&
                Object.keys(cliente.productos).length > 0
            ){
                setStorageItem(
                    claveCliente(cliente.numero_cliente),
                    JSON.stringify(cliente.productos)
                );
            }else{
                removeStorageItem(
                    claveCliente(cliente.numero_cliente)
                );
            }
        });

        guardarClientesDinamicos(
            mesaActual,
            clientesDinamicos
        );

        mostrarClientes();
        await cargarObservacionPunto();

    }catch(error){

        console.error(
            "Error leyendo clientes desde Supabase:",
            error
        );

        mostrarClientes();
        await cargarObservacionPunto();
    }
}

async function cargarObservacionPunto(){
    const input = document.getElementById("observacionPunto");
    if(!input){
        return;
    }
    try{
        input.value = await obtenerObservacionPuntoSupabase(tipoPuntoActual, mesaActual);
    }catch(error){
        console.warn("No se pudo cargar la observación del punto.", error);
    }
}

async function guardarObservacionPuntoActual(boton){
    const input = document.getElementById("observacionPunto");
    const estado = document.getElementById("estadoObservacion");
    if(!input){
        return;
    }
    const textoOriginal = boton ? boton.innerHTML : "";
    if(boton){
        boton.disabled = true;
        boton.innerHTML = "Guardando...";
    }
    if(estado){
        estado.textContent = "";
    }
    try{
        await guardarObservacionPuntoSupabase(
            tipoPuntoActual,
            mesaActual,
            input.value
        );
        if(estado){
            estado.textContent = "Observación guardada.";
        }
    }catch(error){
        console.error("No se pudo guardar la observación:", error);
        if(estado){
            estado.textContent = "No se pudo guardar la observación.";
        }
        alert("No se pudo guardar la observación.");
    }finally{
        if(boton){
            boton.disabled = false;
            boton.innerHTML = textoOriginal;
        }
    }
}

ciriguaAuthReady.then(function(){
    iniciarClientes();
    suscribirClientesTiempoReal();
});

let canalClientesTiempoReal = null;
let temporizadorClientesTiempoReal = null;
let clientesTiempoRealCargando = false;
let clientesTiempoRealPendiente = false;

function registroEventoPunto(payload){
    if(!payload){
        return {};
    }
    return payload.new || payload.old || {};
}

function eventoCorrespondeAPuntoActual(payload, campoTipo){
    const registro = registroEventoPunto(payload);
    if(registro[campoTipo] && normalizarTipoPuntoCirigua(registro[campoTipo]) !== tipoPuntoActual){
        return false;
    }
    if(registro.mesa_numero !== undefined && Number(registro.mesa_numero) !== Number(mesaActual)){
        return false;
    }
    if(registro.numero !== undefined && Number(registro.numero) !== Number(mesaActual)){
        return false;
    }
    return true;
}

function programarClientesTiempoReal(){
    clearTimeout(temporizadorClientesTiempoReal);
    temporizadorClientesTiempoReal = setTimeout(actualizarClientesTiempoReal, 120);
}

async function actualizarClientesTiempoReal(){
    if(clientesTiempoRealCargando){
        clientesTiempoRealPendiente = true;
        return;
    }

    clientesTiempoRealCargando = true;
    try{
        await iniciarClientes();
    }finally{
        clientesTiempoRealCargando = false;
        if(clientesTiempoRealPendiente){
            clientesTiempoRealPendiente = false;
            programarClientesTiempoReal();
        }
    }
}

function suscribirClientesTiempoReal(){
    if(canalClientesTiempoReal || !supabaseClient || typeof supabaseClient.channel !== "function"){
        return;
    }

    canalClientesTiempoReal = supabaseClient
        .channel("cirigua-clientes-" + tipoPuntoActual + "-" + mesaActual)
        .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "clientes_mesa",
            filter: "mesa_numero=eq." + Number(mesaActual)
        }, function(payload){
            if(eventoCorrespondeAPuntoActual(payload, "tipo_punto")){
                programarClientesTiempoReal();
            }
        })
        .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "puntos_atencion",
            filter: "numero=eq." + Number(mesaActual)
        }, function(payload){
            if(eventoCorrespondeAPuntoActual(payload, "tipo")){
                programarClientesTiempoReal();
            }
        })
        .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "ocupaciones_mesa",
            filter: "mesa_numero=eq." + Number(mesaActual)
        }, function(payload){
            if(eventoCorrespondeAPuntoActual(payload, "tipo_punto")){
                programarClientesTiempoReal();
            }
        })
        .subscribe(function(estado){
            if(estado === "CHANNEL_ERROR" || estado === "TIMED_OUT"){
                const canalAnterior = canalClientesTiempoReal;
                canalClientesTiempoReal = null;
                if(supabaseClient && typeof supabaseClient.removeChannel === "function"){
                    supabaseClient.removeChannel(canalAnterior);
                }
                setTimeout(suscribirClientesTiempoReal, 1500);
            }
        });
}

</script>

<script src="offline.js"></script>
<script src="pwa.js"></script>
</body>

</html>
