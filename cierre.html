<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cierre de Caja</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="CIRIGUAPP">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" href="icons/icon-192.png" type="image/png">
</head>

<body>

    <div class="encabezado">

        <h1>🔒 Cierre de Caja</h1>

        <p>Resumen del Día</p>

    </div>

    <div class="total-mesa">

        VENTAS DEL DÍA

        <h2 id="ventas">$0</h2>

        <button
            class="reiniciar-turno-btn"
            onclick="reiniciarTurnoCapacitacion(this)">
            🔄 Reiniciar Turno Actual
        </button>

    </div>

    <div class="total-mesa">

        GASTOS DEL DÍA

        <h2 id="gastos">$0</h2>

    </div>

    <div class="total-mesa">

        UTILIDAD

        <h2 id="utilidad">$0</h2>

    </div>

    <div class="total-mesa administrador-cierre">

        ADMINISTRADOR DEL CIERRE

        <div class="selector-administrador-cierre">
            <label for="administradorCierre">Seleccione quién realiza el cierre</label>

            <select id="administradorCierre" name="administradorCierre" aria-label="Administrador del cierre">
                <option value="">Seleccione quién realiza el cierre</option>
                <option value="Antonio">Antonio</option>
                <option value="Duvel">Duvel</option>
            </select>
        </div>

    </div>

<button class="guardar"
    onclick="cerrarCaja(this)">

        🔒 Cerrar Caja

    </button>

    <button class="volver"
    onclick="window.location.href='index.html'">

        🏠 Inicio

    </button>

    <div id="modalReinicioTurno" class="modal-reinicio-turno" hidden>
        <form id="formReinicioTurno" class="modal-reinicio-panel">
            <h2>Confirmar contraseña</h2>
            <p>Ingrese nuevamente la contraseña del usuario autenticado.</p>

            <input
                id="passwordReinicioTurno"
                type="password"
                autocomplete="current-password"
                placeholder="Contraseña"
                required
            >

            <div class="acciones-reinicio-turno">
                <button type="submit" class="guardar">
                    Continuar
                </button>

                <button type="button" class="volver" id="cancelarReinicioTurno">
                    Cancelar
                </button>
            </div>
        </form>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="utils.js"></script>
<script src="ventas.js"></script>
<script>

let resumenDia = obtenerResumenDelDia();
let ventas = resumenDia.totalVentas;
let cantidadFacturas = resumenDia.cantidadFacturas;
let clientesAtendidos = resumenDia.clientesAtendidos;
let productoTop = resumenDia.productoTop;
let promedio = resumenDia.promedio;

let listaGastos = obtenerGastosHoy();

let gastos = calcularTotalGastos(listaGastos);

let utilidad =
    ventas - gastos;

function pintarResumenCierre(){
    utilidad = ventas - gastos;
    document.getElementById("ventas").innerHTML =
    "$" + ventas.toLocaleString();

    document.getElementById("gastos").innerHTML =
    "$" + gastos.toLocaleString();

    document.getElementById("utilidad").innerHTML =
    "$" + utilidad.toLocaleString();
}

async function cargarResumenCierre(){
    if(typeof obtenerVentasSupabase !== "function" || typeof obtenerGastosSupabase !== "function"){
        pintarResumenCierre();
        return;
    }
    try{
        let periodoActual = null;
        if(typeof obtenerPeriodoCajaAbiertoSupabase === "function"){
            periodoActual = await obtenerPeriodoCajaAbiertoSupabase();
        }

        let ventasSupabase = await obtenerVentasSupabase();
        let ventasAbiertas = ventasSupabase.filter(function(venta){
            if(venta.cierre_id){
                return false;
            }
            if(!periodoActual || !periodoActual.inicio){
                return true;
            }
            return new Date(venta.timestamp).getTime() >= new Date(periodoActual.inicio).getTime();
        });
        ventas = sumarTotalVentas(ventasAbiertas);
        cantidadFacturas = ventasAbiertas.length;
        clientesAtendidos = 0;
        let productoContador = {};
        ventasAbiertas.forEach(function(venta){
            clientesAtendidos += contarClientesVenta(venta);
            let productosNormalizados = normalizarProductosVenta(venta);
            for(let nombre in productosNormalizados){
                productoContador[nombre] =
                    (productoContador[nombre] || 0) + Number(productosNormalizados[nombre].cantidad);
            }
        });
        productoTop = "-";
        let maxCantidad = 0;
        Object.keys(productoContador).forEach(function(producto){
            if(productoContador[producto] > maxCantidad){
                maxCantidad = productoContador[producto];
                productoTop = producto;
            }
        });
        promedio = cantidadFacturas > 0 ? ventas / cantidadFacturas : 0;
        listaGastos = await obtenerGastosSupabase();
        if(periodoActual && periodoActual.id){
            listaGastos = listaGastos.filter(function(gasto){
                return gasto.periodo_id === periodoActual.id;
            });
        }
        gastos = calcularTotalGastos(listaGastos);
        setStorageItem("historialVentas", JSON.stringify(ventasSupabase));
        setStorageItem("gastosHoy", JSON.stringify(listaGastos));
    }catch(error){
        console.warn("No se pudo cargar resumen desde Supabase; usando cache local.", error);
    }
    pintarResumenCierre();
}

function solicitarContrasenaReinicio(){
    return new Promise(function(resolve){
        const modal = document.getElementById("modalReinicioTurno");
        const form = document.getElementById("formReinicioTurno");
        const input = document.getElementById("passwordReinicioTurno");
        const cancelar = document.getElementById("cancelarReinicioTurno");

        if(!modal || !form || !input || !cancelar){
            resolve(null);
            return;
        }

        function cerrar(valor){
            form.removeEventListener("submit", confirmar);
            cancelar.removeEventListener("click", cancelarAccion);
            modal.hidden = true;
            input.value = "";
            resolve(valor);
        }

        function confirmar(evento){
            evento.preventDefault();
            cerrar(input.value);
        }

        function cancelarAccion(){
            cerrar(null);
        }

        form.addEventListener("submit", confirmar);
        cancelar.addEventListener("click", cancelarAccion);
        modal.hidden = false;
        input.focus();
    });
}

function reiniciarTurnoCapacitacion(boton){
    return ejecutarAccionCritica(boton, async function(){
        const password = await solicitarContrasenaReinicio();

        if(!password){
            return false;
        }

        try{
            await validarContrasenaActualSupabase(password);
        }catch(error){
            console.warn("Contraseña inválida para reiniciar turno.", error);
            alert("Contraseña incorrecta. No se reinició el turno.");
            return false;
        }

        const confirmar = confirm(
            "Esta acción reiniciará únicamente las ventas visibles del período actual.\n\n" +
            "No eliminará el historial.\n\n" +
            "¿Desea continuar?"
        );

        if(!confirmar){
            return false;
        }

        try{
            await reiniciarTurnoActualSupabase();
            ventas = 0;
            cantidadFacturas = 0;
            clientesAtendidos = 0;
            productoTop = "-";
            promedio = 0;
            listaGastos = [];
            gastos = 0;
            pintarResumenCierre();
            alert("Turno reiniciado correctamente. El historial fue conservado.");
            return true;
        }catch(error){
            console.error("No se pudo reiniciar el turno actual:", error);
            alert("No se pudo reiniciar el turno. Los datos fueron conservados.");
            return false;
        }
    });
}

function cerrarCaja(boton){
    return ejecutarAccionCritica(boton, async function(){

    let administradorSeleccionado =
        document.getElementById("administradorCierre");

    if(!administradorSeleccionado || !administradorSeleccionado.value){
        alert("Seleccione quién realiza el cierre de caja.");
        return false;
    }

    let administrador =
        administradorSeleccionado.value;

    let confirmar =
        confirm(
            "¿Confirma el cierre del día realizado por " + administrador + "?\n\n" +
            "Ventas: $" + ventas.toLocaleString() + "\n" +
            "Gastos: $" + gastos.toLocaleString() + "\n" +
            "Utilidad: $" + utilidad.toLocaleString()
        );

    if(!confirmar){
        return false;
    }

    if(typeof cerrarCajaSupabase === "function"){
        try{
            let cierreSupabase = await cerrarCajaSupabase(administrador);
            let cierresActuales = safeParse(localStorage.getItem("cierresCaja"), []) || [];
            if(!Array.isArray(cierresActuales)){
                cierresActuales = [];
            }
            cierresActuales.push(cierreSupabase);
            setStorageItem("cierresCaja", JSON.stringify(cierresActuales));
            setStorageItem("ultimoCierreCaja", JSON.stringify({
                fecha: cierreSupabase.fecha,
                hora: cierreSupabase.hora,
                timestamp: cierreSupabase.timestamp
            }));
            setStorageItem("gastosHoy", JSON.stringify([]));
            removeStorageItem("ultimaVenta");
            alert("Caja cerrada correctamente");
            location.reload();
            return true;
        }catch(error){
            console.error("No se pudo cerrar caja en Supabase:", error);
            alert("No se pudo cerrar la caja. Los datos fueron conservados.");
            return false;
        }
    }

    alert("Supabase no está disponible para cerrar la caja. Los datos fueron conservados.");
    return false;
    });
}

ciriguaAuthReady.then(cargarResumenCierre);

</script>

<script src="offline.js"></script>
<script src="pwa.js"></script>
</body>

</html>
