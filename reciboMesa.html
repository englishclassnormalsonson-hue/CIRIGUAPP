<script>


const parametros =
new URLSearchParams(window.location.search);

let mesa =
parametros.get("mesa");

let ocupacionId =
parametros.get("ocupacion") || parametros.get("ocupacion_id");

let ahora = new Date();

let numeroFactura =
obtenerConsecutivoFactura();

function obtenerProductosMesaActiva(){
    let productosPorCliente = {};
    obtenerTodosLosClientes(mesa).forEach(function(cliente){
        let datosCliente = leerProductosCliente(mesa, cliente);
        if(Object.keys(datosCliente).length > 0){
            productosPorCliente["cliente_" + cliente] = datosCliente;
        }
    });
    return productosPorCliente;
}

function normalizarProductosPorClienteVenta(venta){
    if(!venta || typeof venta !== 'object'){
        return {};
    }
    if(venta.productosPorCliente && typeof venta.productosPorCliente === 'object'){
        return venta.productosPorCliente;
    }
    if(Array.isArray(venta.productos)){
        let productosArray = {};
        venta.productos.forEach(function(producto){
            if(!producto || !producto.nombre) return;
            productosArray[producto.nombre] = {
                cantidad: producto.cantidad,
                precio: producto.precio
            };
        });
        return {"cliente_0": productosArray};
    }
    if(venta.productos && typeof venta.productos === 'object'){
        let clienteKeys = Object.keys(venta.productos).filter(function(key){
            return String(key).indexOf("cliente_") === 0;
        });
        if(clienteKeys.length > 0){
            return venta.productos;
        }
        return {"cliente_0": venta.productos};
    }
    return {};
}

function pintarProductosPorCliente(productosPorCliente){
    let salida = "";
    let total = 0;
    for(let clienteKey in productosPorCliente){
        let productosCliente = productosPorCliente[clienteKey] || {};
        let clienteNum = String(clienteKey).replace('cliente_','');
        let subtotalCliente = 0;
        let tieneConsumo = Object.keys(productosCliente).length > 0;
        if(tieneConsumo){
            salida += "<br><b>CLIENTE " + clienteNum + "</b><br>";
        }
        for(let nombre in productosCliente){
            let item = productosCliente[nombre];
            if(!item || typeof item !== "object" || Array.isArray(item)){
                continue;
            }
            let cantidad = Number(item.cantidad);
            let precio = Number(item.precio);
            if(!Number.isFinite(cantidad) || !Number.isFinite(precio)){
                continue;
            }
            if(cantidad <= 0 || precio < 0){
                continue;
            }
            let subtotal = cantidad * precio;
            subtotalCliente += subtotal;
            total += subtotal;
            salida += "<div class='item'><span>" + cantidad + " x " + nombre + "</span><span>$" + subtotal.toLocaleString() + "</span></div>";
        }
        if(tieneConsumo){
            salida += "<br><b>Subtotal Cliente " + clienteNum + ": $" + subtotalCliente.toLocaleString() + "</b>";
            salida += "<div class='linea'></div>";
        }
    }
    return {
        html: salida,
        total: total
    };
}

let productosMesaActiva = obtenerProductosMesaActiva();
let tienePedidoActivo = Object.keys(productosMesaActiva).length > 0;

// Intentar obtener una venta reciente solo cuando la mesa ya no tenga pedido abierto.
let ultimaVenta = obtenerUltimaVenta();
let historial = obtenerHistorialVentas();
let ventaMesa = null;

if(!tienePedidoActivo){
    if(ultimaVenta && Number(ultimaVenta.mesa) === Number(mesa) && (ultimaVenta.tipo || '').toLowerCase().includes('mesa')){
        ventaMesa = ultimaVenta;
    } else {
        // Buscar en el historial la última venta de esta mesa (cobro de mesa)
        ventaMesa = historial.slice().reverse().find(function(f){
            return Number(f.mesa) === Number(mesa) && (String(f.tipo || '').toLowerCase().includes('mesa'));
        }) || null;
    }
}

if(ventaMesa){
    numeroFactura = Number(ventaMesa.factura) || numeroFactura;
    if(ventaMesa.timestamp){
        let fechaVenta = new Date(ventaMesa.timestamp);
        if(!isNaN(fechaVenta.getTime())){
            ahora = fechaVenta;
        }
    } else {
        let fechaFallback = parseFechaHoraLocal(ventaMesa.fecha, ventaMesa.hora);
        if(fechaFallback){
            ahora = fechaFallback;
        }
    }
}

document.getElementById("datos").innerHTML =

"<b>Factura Venta N°:</b> " +

String(numeroFactura).padStart(6,"0") +

"<br><br><b>Mesa:</b> " +

mesa +

"<br><b>Fecha:</b> " +

ahora.toLocaleDateString() +

"<br><b>Hora:</b> " +

ahora.toLocaleTimeString();

let html = "";

let totalMesa = 0;

if(tienePedidoActivo){
    let render = pintarProductosPorCliente(productosMesaActiva);
    html = render.html;
    totalMesa = render.total;
} else if(ventaMesa){
    let render = pintarProductosPorCliente(normalizarProductosPorClienteVenta(ventaMesa));
    html = render.html;
    totalMesa = render.total;
} else {
    html = "";
}

document.getElementById("productos").innerHTML = html;

document.getElementById("total").innerHTML = "TOTAL MESA: $" + totalMesa.toLocaleString();

function combinarVentasPorCliente(ventas){
    let combinado = {};
    (ventas || []).forEach(function(venta){
        let productosVenta = normalizarProductosPorClienteVenta(venta);
        Object.keys(productosVenta).forEach(function(clienteKey){
            if(!combinado[clienteKey]){
                combinado[clienteKey] = {};
            }
            let productosCliente = productosVenta[clienteKey] || {};
            Object.keys(productosCliente).forEach(function(nombre){
                let item = productosCliente[nombre];
                if(!item || typeof item !== "object" || Array.isArray(item)){
                    return;
                }
                let cantidad = Number(item.cantidad);
                let precio = Number(item.precio);
                if(!Number.isFinite(cantidad) || !Number.isFinite(precio) || cantidad <= 0 || precio < 0){
                    return;
                }
                if(!combinado[clienteKey][nombre]){
                    combinado[clienteKey][nombre] = {
                        cantidad: 0,
                        precio: precio
                    };
                }
                combinado[clienteKey][nombre].cantidad += cantidad;
                combinado[clienteKey][nombre].precio = precio;
            });
        });
    });
    return combinado;
}

function renderizarReciboMesaHistorico(ventas){
    if(!Array.isArray(ventas) || ventas.length === 0){
        return;
    }
    let primera = ventas[0];
    let ultima = ventas[ventas.length - 1];
    let fechaVenta = ultima.timestamp ? new Date(ultima.timestamp) : new Date();
    if(isNaN(fechaVenta.getTime())){
        fechaVenta = new Date();
    }
    document.getElementById("datos").innerHTML =
        "<b>Factura Venta N°:</b> " +
        String(ultima.factura).padStart(6,"0") +
        "<br><br><b>Mesa:</b> " +
        mesa +
        (primera.ocupacion_id ? "<br><b>Ocupación:</b> " + primera.ocupacion_id : "") +
        "<br><b>Fecha:</b> " +
        fechaVenta.toLocaleDateString() +
        "<br><b>Hora:</b> " +
        fechaVenta.toLocaleTimeString();

    let render = pintarProductosPorCliente(combinarVentasPorCliente(ventas));
    document.getElementById("productos").innerHTML = render.html;
    document.getElementById("total").innerHTML = "TOTAL MESA: $" + render.total.toLocaleString();
}

async function actualizarReciboMesaDesdeSupabase(){
    if(tienePedidoActivo || typeof obtenerVentasSupabase !== "function"){
        return;
    }
    try{
        let ventas = ocupacionId && typeof obtenerVentasPorOcupacionSupabase === "function"
            ? await obtenerVentasPorOcupacionSupabase(ocupacionId)
            : await obtenerVentasSupabase();
        if(!ocupacionId){
            guardarHistorialVentasEnCache(ventas);
        }
        if(!ocupacionId){
            let ultima = ventas.slice().reverse().find(function(venta){
                return Number(venta.mesa) === Number(mesa);
            });
            ventas = ultima && ultima.ocupacion_id
                ? ventas.filter(function(venta){
                    return venta.ocupacion_id === ultima.ocupacion_id;
                })
                : (ultima ? [ultima] : []);
        }
        renderizarReciboMesaHistorico(ventas);
    }catch(error){
        console.warn("No se pudo actualizar recibo de mesa desde Supabase.", error);
    }
}

ciriguaAuthReady.then(actualizarReciboMesaDesdeSupabase);

</script>
