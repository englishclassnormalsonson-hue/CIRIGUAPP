<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIRIGUAPP - Iniciar sesión</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="CIRIGUAPP">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" href="icons/icon-192.png" type="image/png">
</head>

<body class="login-page">

    <main class="login-shell">
        <section class="login-panel">
            <div class="logo">
                <img src="LOGOINICIO1.jpeg" alt="Logo El Cirigua Café Bar">
            </div>
            <h1>EL CIRIGUA</h1>
            <p>Café • Bar</p>

            <form id="loginForm" class="login-form">
                <label for="loginEmail">Correo</label>
                <input id="loginEmail" type="email" autocomplete="username" required>

                <label for="loginPassword">Contraseña</label>
                <input id="loginPassword" type="password" autocomplete="current-password" required>

                <button id="loginSubmit" type="submit" class="login-submit">
                    Ingresar
                </button>

                <p id="loginMessage" class="login-message" aria-live="polite"></p>
            </form>
        </section>
    </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="offline.js"></script>
<script src="pwa.js"></script>
</body>

</html>
