<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Mesa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="CIRIGUAPP">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" href="icons/icon-192.png" type="image/png">
</head>

<body>

    <div class="barra-superior">

    <button
    class="inicio pedido-sticky-home"
    onclick="window.location.href='index.html'">

        🏠 Inicio

    </button>

</div>

    <div class="encabezado">

        <h1 id="tituloCliente">Mesa 1</h1>

        <p>Gestión de Pedido</p>

    </div>

    <div class="pedido-container">

        <h2>Productos</h2>

        <input
            class="buscar-producto"
            id="buscarProducto"
            type="search"
            placeholder="Buscar producto..."
            oninput="filtrarProductos()"
        >

        <div class="categorias-productos" id="categoriasProductos">

        </div>

        <h2>Venta rápida</h2>

        <div class="venta-rapida" id="ventaRapida">

        </div>

        <div class="productos" id="productos">

        </div>

        <h2>Pedido Actual</h2>

<div class="pedido" id="pedido">

</div>

<div class="total" id="total">

    TOTAL: $0

</div>

        </div>

<div class="acciones">
    
    <button class="cobrar" onclick="cobrarCliente(this)">
        💰 Cobrar Cliente
    </button>

    <button class="recibo-btn" onclick="verRecibo()">
        🧾 Ver Recibo
    </button>

</div>

<div class="acciones-volver">

    <button class="recibo-mesa"
    onclick="verReciboMesa()">
        🧾 Recibo Mesa
    </button>

    <button class="volver"
    id="botonVolver">
        ⬅ Volver
    </button>

</div>

<script>

const parametrosPedido =
new URLSearchParams(window.location.search);

let mesa =
Number(parametrosPedido.get(parametrosPedido.has("barra") ? "barra" : "mesa") || parametrosPedido.get("mesa") || 1);

let tipoPuntoActual =
String(parametrosPedido.get("tipo") || (parametrosPedido.has("barra") ? "barra" : "mesa")).toLowerCase() === "barra"
    ? "barra"
    : "mesa";

let cliente =
parametrosPedido.get("cliente") || 1;

let etiquetaPuntoActual =
(tipoPuntoActual === "barra" ? "Barra " : "Mesa ") + mesa;

document.getElementById("tituloCliente").innerHTML =
etiquetaPuntoActual + " - Cliente " + cliente;

document.getElementById("botonVolver").onclick = function(){

    window.location.href =
    (tipoPuntoActual === "barra"
        ? "clientes.html?tipo=barra&barra=" + mesa
        : "clientes.html?tipo=mesa&mesa=" + mesa);
};

function verReciboMesa(){

    window.open(

        (tipoPuntoActual === "barra"
            ? "reciboMesa.html?tipo=barra&barra=" + mesa
            : "reciboMesa.html?tipo=mesa&mesa=" + mesa),

        "_blank"
    );

}

</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="utils.js"></script>
<script src="ventas.js"></script>
<script src="script.js"></script>

<script src="offline.js"></script>
<script src="pwa.js"></script>
</body>

</html>
