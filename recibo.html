class="imprimir"

🖨️ Imprimir

</button>

<script src="supabase.js"></script>

<script>

const parametros =
new URLSearchParams(window.location.search);

function escaparHtmlRecibo(valor){
    return String(valor || "").replace(/[<>&"']/g, function(caracter){
        return {
            "<": "&lt;",
            ">": "&gt;",
            "&": "&amp;",
            "\"": "&quot;",
            "'": "&#039;"
        }[caracter];
    });
}

let mesa =
Number(parametros.get(parametros.has("barra") ? "barra" : "mesa") || parametros.get("mesa") || 1);

let tipoPuntoActual =
normalizarTipoPuntoCirigua(parametros.get("tipo") || (parametros.has("barra") ? "barra" : "mesa"));

let etiquetaPuntoActual =
etiquetaPuntoCirigua(tipoPuntoActual, mesa);

let cliente =
parametros.get("cliente");

let datosCliente = leerProductosCliente(mesa, cliente);
let historial = obtenerHistorialVentas();
let ultimaVenta = obtenerUltimaVenta();
let tienePedidoActivo = Object.keys(datosCliente).length > 0;

let ultimaFactura = null;

if(!tienePedidoActivo){
    let clienteSeleccion = Number(cliente);
    if(ultimaVenta && normalizarTipoPuntoCirigua(ultimaVenta.tipoPunto || "mesa") === tipoPuntoActual &&
        Number(ultimaVenta.mesa) === Number(mesa) &&
        (Number(ultimaVenta.cliente) === clienteSeleccion ||
         (Number(ultimaVenta.cliente) === 0 &&
          String(ultimaVenta.tipo || '').toLowerCase().indexOf('cobro mesa') !== -1 &&
          ((ultimaVenta.productosPorCliente && ultimaVenta.productosPorCliente['cliente_' + clienteSeleccion]) ||
           (ultimaVenta.productos && typeof ultimaVenta.productos === 'object' && ultimaVenta.productos['cliente_' + clienteSeleccion]))))){
        ultimaFactura = ultimaVenta;
    } else {
        ultimaFactura = historial.slice().reverse().find(function(f){
            return normalizarTipoPuntoCirigua(f.tipoPunto || "mesa") === tipoPuntoActual &&
                Number(f.mesa) === Number(mesa) &&
                (Number(f.cliente) === clienteSeleccion ||
                 (Number(f.cliente) === 0 &&
                  String(f.tipo || '').toLowerCase().indexOf('cobro mesa') !== -1 &&
                  ((f.productosPorCliente && f.productosPorCliente['cliente_' + clienteSeleccion]) ||
                   (f.productos && typeof f.productos === 'object' && f.productos['cliente_' + clienteSeleccion]))));
        }) || null;
    }
}

let ahora = null;
if(ultimaFactura){
    if(ultimaFactura.timestamp){
        let fechaTimestamp = new Date(ultimaFactura.timestamp);
        if(!isNaN(fechaTimestamp.getTime())){
            ahora = fechaTimestamp;
        }
    }
    if(!ahora){
        ahora = parseFechaHoraLocal(ultimaFactura.fecha, ultimaFactura.hora);
    }
}
if(!ahora){
    ahora = new Date();
}

let numeroFactura = ultimaFactura ? ultimaFactura.factura : obtenerConsecutivoFactura();

if(ultimaFactura){
    if(ultimaFactura.productosPorCliente && ultimaFactura.productosPorCliente['cliente_' + cliente]){
        datosCliente = ultimaFactura.productosPorCliente['cliente_' + cliente] || {};
    } else if(ultimaFactura.productos){
        if(Array.isArray(ultimaFactura.productos)){
            datosCliente = {};
            ultimaFactura.productos.forEach(function(producto){
                if(!producto || !producto.nombre) return;
                datosCliente[producto.nombre] = {
                    cantidad: Number(producto.cantidad) || 0,
                    precio: Number(producto.precio) || 0
                };
            });
        } else if(typeof ultimaFactura.productos === 'object'){
            if(ultimaFactura.productos['cliente_' + cliente]){
                datosCliente = ultimaFactura.productos['cliente_' + cliente] || {};
            } else {
                datosCliente = ultimaFactura.productos;
            }
        }
    }
}

document.getElementById("datos").innerHTML =

"<b>Factura N°:</b> " +
String(numeroFactura).padStart(6,"0") +
"<br><br><b>Punto:</b> " +
etiquetaPuntoActual +
(ultimaFactura && ultimaFactura.observacion ? "<br><b>Observación:</b> " + escaparHtmlRecibo(ultimaFactura.observacion) : "") +
"<br><b>Cliente:</b> " +
cliente +
"<br><b>Tipo:</b> " + (ultimaFactura ? ultimaFactura.tipo : "Cobro Individual") +
"<br><b>Fecha:</b> " +
ahora.toLocaleDateString() +
"<br><b>Hora:</b> " +
ahora.toLocaleTimeString();
if(ultimaFactura){
    document.title = "Factura #" + String(numeroFactura).padStart(6,"0");
}

let html = "";

let total = 0;

for(let nombre in datosCliente){

    let item =
    datosCliente[nombre];

    if(!item || typeof item !== "object" || Array.isArray(item)){
        continue;
    }

    let cantidad =
    Number(item.cantidad);

    let precio =
    Number(item.precio);

    if(!Number.isFinite(cantidad) || !Number.isFinite(precio)){
        continue;
    }

    if(cantidad <= 0 || precio < 0){
        continue;
    }

    let subtotal =
    cantidad * precio;

    total += subtotal;

    html +=

    "<div class='item'>" +

    "<span>" +

    cantidad + " x " + nombre +

    "</span>" +

    "<span>$" +

    subtotal.toLocaleString() +

    "</span>" +

    "</div>";
}

document.getElementById("productos").innerHTML =
html;

document.getElementById("total").innerHTML =

"TOTAL: $" +

total.toLocaleString();

function renderizarReciboIndividual(venta){
    if(!venta){
        return;
    }
    let datos = {};
    if(venta.productosPorCliente && venta.productosPorCliente['cliente_' + cliente]){
        datos = venta.productosPorCliente['cliente_' + cliente] || {};
    }else if(venta.productos && venta.productos['cliente_' + cliente]){
        datos = venta.productos['cliente_' + cliente] || {};
    }else if(Number(venta.cliente) === Number(cliente)){
        datos = venta.productos || {};
    }else{
        return;
    }

    let fechaVenta = venta.timestamp ? new Date(venta.timestamp) : new Date();
    if(isNaN(fechaVenta.getTime())){
        fechaVenta = new Date();
    }

    document.getElementById("datos").innerHTML =
        "<b>Factura N°:</b> " +
        String(venta.factura).padStart(6,"0") +
        "<br><br><b>Punto:</b> " +
        etiquetaPuntoCirigua(venta.tipoPunto || tipoPuntoActual, venta.puntoNumero || venta.mesa || mesa) +
        (venta.observacion ? "<br><b>Observación:</b> " + escaparHtmlRecibo(venta.observacion) : "") +
        "<br><b>Cliente:</b> " +
        cliente +
        "<br><b>Tipo:</b> " + venta.tipo +
        "<br><b>Fecha:</b> " +
        fechaVenta.toLocaleDateString() +
        "<br><b>Hora:</b> " +
        fechaVenta.toLocaleTimeString();

    let htmlRemoto = "";
    let totalRemoto = 0;
    for(let nombre in datos){
        let item = datos[nombre];
        if(!item || typeof item !== "object" || Array.isArray(item)){
            continue;
        }
        let cantidad = Number(item.cantidad);
        let precio = Number(item.precio);
        if(!Number.isFinite(cantidad) || !Number.isFinite(precio) || cantidad <= 0 || precio < 0){
            continue;
        }
        let subtotal = cantidad * precio;
        totalRemoto += subtotal;
        htmlRemoto += "<div class='item'><span>" + cantidad + " x " + nombre + "</span><span>$" + subtotal.toLocaleString() + "</span></div>";
    }

    document.getElementById("productos").innerHTML = htmlRemoto;
    document.getElementById("total").innerHTML = "TOTAL: $" + totalRemoto.toLocaleString();
    document.title = "Factura #" + String(venta.factura).padStart(6,"0");
}

async function actualizarReciboDesdeSupabase(){
    if(tienePedidoActivo || typeof obtenerVentasSupabase !== "function"){
        return;
    }
    try{
        let ventas = await obtenerVentasSupabase();
        guardarHistorialVentasEnCache(ventas);
        let venta = ventas.slice().reverse().find(function(f){
            return normalizarTipoPuntoCirigua(f.tipoPunto || "mesa") === tipoPuntoActual &&
                Number(f.mesa) === Number(mesa) &&
                (Number(f.cliente) === Number(cliente) ||
                 (Number(f.cliente) === 0 &&
                  f.productosPorCliente &&
                  f.productosPorCliente['cliente_' + cliente]));
        });
        renderizarReciboIndividual(venta);
    }catch(error){
        console.warn("No se pudo actualizar recibo desde Supabase.", error);
    }
}

ciriguaAuthReady.then(actualizarReciboDesdeSupabase);

</script>
